name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install lint tools
        run: pip install ruff isort

      - name: ruff check
        run: cd agent && ruff check .

      - name: ruff format check
        run: cd agent && ruff format --check .

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: miniblog_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptest_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        working-directory: agent
        env:
          APP_ENV: development
          DATABASE_URL: mysql+pymysql://root:test_password@localhost:3306/miniblog_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          REDIS_DB: 0
          OPENAI_API_KEY: "test-key-not-real"
          JWT_SECRET_KEY: "test-secret-key-for-ci"
        run: python -m pytest tests/ -v --tb=short -x

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: agent
          push: false
          tags: miniblog-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
