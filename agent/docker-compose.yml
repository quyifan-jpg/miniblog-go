version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-miniblog}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-root}
      - REDIS_DB=${REDIS_DB:-0}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:root@mysql:3306/miniblog}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - mysql
    volumes:
      - ./databases:/app/databases
      - ./podcasts:/app/podcasts
      - ./browsers:/app/browsers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    build: .
    command: python celery_worker.py
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-root}
      - REDIS_DB=${REDIS_DB:-0}
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:root@mysql:3306/miniblog}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - api
      - mysql
    volumes:
      - ./databases:/app/databases
      - ./podcasts:/app/podcasts
      - ./browsers:/app/browsers
    restart: unless-stopped
    deploy:
      replicas: 2

  scheduler:
    build: .
    command: python scheduler.py
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://root:root@mysql:3306/miniblog}
    volumes:
      - ./databases:/app/databases
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-root}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
  mysql-data:
